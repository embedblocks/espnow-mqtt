## ESP-NOW MQTT component manifest

version: "0.2.0"
description: >
  Lightweight MQTT-like publish/subscribe over ESP-NOW. Stateless publishers,
  central WiFi-connected broker, no fragmentation, 250-byte frame discipline.
  Requires ESP-IDF >= 5.5.0.

url: "https://github.com/embedblocks/espnow-mqtt"


license: "MIT"

targets:
  - esp32
  - esp32s3
  - esp32c3
  - esp32c6
  - esp32s2

tags:
  - espnow
  - mqtt
  - pubsub
  - wireless
  - iot
  - sensor
  - esp-now
  - broker
  - publisher

files:
   use_gitignore: true
   exclude:
      - ".git/**/*"
      - "docs/**/*"
      - "dist/**/*"
      - "*.docx"
      


dependencies:
  idf: ">=5.5.0"
